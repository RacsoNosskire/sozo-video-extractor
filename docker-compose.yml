services:
  sozo-extractor:
    build: .
    container_name: sozo-video-extractor
    restart: unless-stopped
    ports:
      - "3232:3232"
    environment:
      - PORT=3232
      - NODE_ENV=production
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    shm_size: '256m'

  anikai-api:
    build: ./anikai-api
    container_name: sozo-anikai-api
    restart: unless-stopped
    ports:
      - "3233:5000"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
